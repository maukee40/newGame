<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neon Ping Pong - Keyboard Edition</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.15);
            border: 2px solid #00f2ff;
            border-radius: 12px;
        }

        canvas {
            display: block;
            background: #000;
            border-radius: 10px;
        }

        .ui {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 2.5rem;
            font-weight: 900;
            text-shadow: 0 0 15px #00f2ff;
            pointer-events: none;
            opacity: 0.8;
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: rgba(0, 252, 255, 0.6);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui">
        <div id="playerScore">0</div>
        <div id="aiScore">0</div>
    </div>
    <canvas id="pong"></canvas>
    <div class="instructions">Используй стрелки ↑ и ↓ для управления</div>
</div>

<script>
const canvas = document.getElementById("pong");
const ctx = canvas.getContext("2d");

canvas.width = 800;
canvas.height = 500;

// Состояние клавиш
const keys = {
    ArrowUp: false,
    ArrowDown: false
};

const player = {
    x: 15,
    y: canvas.height / 2 - 50,
    width: 12,
    height: 100,
    color: "#00f2ff",
    score: 0,
    dy: 7 // Скорость перемещения ракетки
};

const ai = {
    x: canvas.width - 27,
    y: canvas.height / 2 - 50,
    width: 12,
    height: 100,
    color: "#ff007b",
    score: 0,
    dy: 4.5 // Скорость ИИ чуть ниже для баланса
};

const ball = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 8,
    speed: 4, // Было 5, теперь 4 (медленнее)
    velocityX: 4,
    velocityY: 4,
    color: "#fff"
};

// Обработка клавиатуры
window.addEventListener("keydown", (e) => {
    if (e.key in keys) {
        keys[e.key] = true;
        e.preventDefault(); // Чтобы страница не скроллилась
    }
});

window.addEventListener("keyup", (e) => {
    if (e.key in keys) {
        keys[e.key] = false;
    }
});

function drawRect(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.shadowBlur = 20;
    ctx.shadowColor = color;
    ctx.fillRect(x, y, w, h);
    ctx.shadowBlur = 0;
}

function drawCircle(x, y, r, color) {
    ctx.fillStyle = color;
    ctx.shadowBlur = 25;
    ctx.shadowColor = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
}

function drawNet() {
    ctx.setLineDash([10, 15]);
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);
    ctx.strokeStyle = "rgba(0, 242, 255, 0.2)";
    ctx.lineWidth = 2;
    ctx.stroke();
}

function resetBall() {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    ball.speed = 4;
    // Случайное направление при спавне
    ball.velocityX = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
    ball.velocityY = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
}

function collision(b, p) {
    return b.x + b.radius > p.x && b.x - b.radius < p.x + p.width &&
           b.y + b.radius > p.y && b.y - b.radius < p.y + p.height;
}

function update() {
    // Движение игрока через стрелки
    if (keys.ArrowUp && player.y > 0) {
        player.y -= player.dy;
    }
    if (keys.ArrowDown && player.y < canvas.height - player.height) {
        player.y += player.dy;
    }

    // Движение мяча
    ball.x += ball.velocityX;
    ball.y += ball.velocityY;

    // ИИ
    let aiTarget = ball.y - (ai.height / 2);
    ai.y += (aiTarget - ai.y) * 0.07;

    // Границы холста для ИИ
    if (ai.y < 0) ai.y = 0;
    if (ai.y > canvas.height - ai.height) ai.y = canvas.height - ai.height;

    // Отскок от верхнего и нижнего края
    if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
        ball.velocityY = -ball.velocityY;
    }

    let p = (ball.x < canvas.width / 2) ? player : ai;

    if (collision(ball, p)) {
        let collidePoint = (ball.y - (p.y + p.height / 2)) / (p.height / 2);
        let angleRad = (Math.PI / 4) * collidePoint;
        let direction = (ball.x < canvas.width / 2) ? 1 : -1;

        ball.velocityX = direction * ball.speed * Math.cos(angleRad);
        ball.velocityY = ball.speed * Math.sin(angleRad);

        // Незначительное ускорение (было 0.3, теперь 0.15)
        ball.speed += 0.15;
    }

    // Счет
    if (ball.x - ball.radius < 0) {
        ai.score++;
        document.getElementById("aiScore").innerText = ai.score;
        resetBall();
    } else if (ball.x + ball.radius > canvas.width) {
        player.score++;
        document.getElementById("playerScore").innerText = player.score;
        resetBall();
    }
}

function render() {
    // Очистка с легким шлейфом
    ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawNet();
    drawRect(player.x, player.y, player.width, player.height, player.color);
    drawRect(ai.x, ai.y, ai.width, ai.height, ai.color);
    drawCircle(ball.x, ball.y, ball.radius, ball.color);
}

function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

// Запуск цикла анимации
requestAnimationFrame(loop);

</script>
</body>
</html>
